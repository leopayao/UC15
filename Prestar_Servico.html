    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
height: 100px;
      background-color: #fff;
      border-bottom: 1px solid #ddd;
    }

    header img.logo {
      height: 30px;
    }

    header .menu {
      font-size: 24px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      color: #555;
    }

    .tab.active {
      border-bottom: 3px solid #c9a227;
      color: #000;
    }

    .form-group {
      margin-bottom: 15px;
      width: 100%;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #d49b3e;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #a97e3a;
    }

    .section {
      margin-top: 30px;
    }

    .section h2 {
      font-size: 18px;
      margin-bottom: 15px;
      text-align: center;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      text-align: center;
    }

    .category {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .jobs {
      margin-top: 30px;
    }

    .job-card {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .job-card h3 {
      margin: 0;
      font-size: 16px;
    }

    .job-card p {
      margin: 5px 0;
      font-size: 14px;
      color: #555;
    }

    .job-card .btn-secondary {
      display: inline-block;
      margin-top: 10px;
      background-color: #a97e3a;
      padding: 8px 15px;
      border-radius: 5px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    .job-card .btn-secondary:hover {
      background-color: #a97e3a;
    }


    footer {
            background-color: #212b40;
            color: #fff;
            text-align: center;
            padding: 20px 0;
        }

    .form-select {
            font-family: Arial, sans-serif;
        }

        .topo {
            height: 10px;
            display: flex;
            align-items: center;
        }

        .Logo {
            width: 130px;
            height: auto;
        }

<div class="container">

  <div class="card shadow card-cadastro">

    <div class="card-header text-center">
      <h4>Cadastro de Prestador de Serviço</h4>
    </div>

    <div class="card-body">

      <form>

        <div class="mb-3">
          <label class="form-label">Nome Completo</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">CPF ou CNPJ</label>
          <input type="text" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Tipo de serviço</label>

          <select class="form-select">

            <option>Selecione</option>
            <option>Eletricista</option>
            <option>Encanador</option>
            <option>Construção</option>
            <option>Limpeza</option>
            <option>Informática</option>
            <option>Outros</option>
            <option>Geral</option>
            <option>Administração</option>
            <option>Manutenção</option>
            <option>Podologia</option>
            <option>Educação</option>
            <option>Jardinagem</option>

          </select>

        </div>

            <label class="form-label">Cidade</label>
            <select class="form-select form-select-sm mb-3">
        <option selected>Selecione</option>
        <option value="1">São Paulo</option>
        <option value="2">Rio de Janeiro</option>
        <option value="3">Brasília</option>
        <option value="4">Salvador</option>
        <option value="5">Fortaleza</option>
        <option value="6">Belo Horizonte</option>
        <option value="7">Manaus</option>
        <option value="8">Curitiba</option>
        <option value="9">Recife</option>
        <option value="10">Porto Alegre</option>
        <option value="11">Goiânia</option>
        <option value="12">Belém</option>
        <option value="13">Guarulhos</option>
        <option value="14">Campinas</option>
        </select>


        <div class="mb-3">
          <label class="form-label">Valor por hora</label>
          <input type="text" class="form-control">
        </div>

        <body>
    <div class="form-group">
    <input type="text" placeholder="Descreva seu serviço">
    </div>

        <div class="d-grid">
          <button class="btn btn-primary">
            Postar Serviço
          </button>
        </div>

      </form>

    </div>

  </div>
