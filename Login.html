    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
height: 100px;
      background-color: #fff;
      border-bottom: 1px solid #ddd;
    }

    header img.logo {
      height: 30px;
    }

    header .menu {
      font-size: 24px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      color: #555;
    }

    .tab.active {
      border-bottom: 3px solid #c9a227;
      color: #000;
    }

    .form-group {
      margin-bottom: 15px;
      width: 100%;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #d49b3e;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #a97e3a;
    }

    .section {
      margin-top: 30px;
    }

    .section h2 {
      font-size: 18px;
      margin-bottom: 15px;
      text-align: center;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      text-align: center;
    }

    .category {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .jobs {
      margin-top: 30px;
    }

    .job-card {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .job-card h3 {
      margin: 0;
      font-size: 16px;
    }

    .job-card p {
      margin: 5px 0;
      font-size: 14px;
      color: #555;
    }

    .job-card .btn-secondary {
      display: inline-block;
      margin-top: 10px;
      background-color: #a97e3a;
      padding: 8px 15px;
      border-radius: 5px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
    }

    .job-card .btn-secondary:hover {
      background-color: #a97e3a;
    }


    footer {
            background-color: #212b40;
            color: #fff;
            text-align: center;

<form id="loginForm">

type="email"

required>

</div>

type="password"
class="form-control"
id="senha"

<script>

.addEventListener("submit", function(e){

let user =
document.getElementById("usuario").value;

let pass =
document.getElementById("senha").value;

if(user == "teste@teste.com" && pass == "123"){

window.location.href =
"Pagina_Inicial.html";

}else{

.innerText =
"Usuário ou senha inválidos";

}

});
