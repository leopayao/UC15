<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HELP - Buscar Vagas</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background-color: #fff;
      border-bottom: 1px solid #ddd;
    }

    header img.logo {
      height: 30px;
    }

    header .menu {
      font-size: 24px;
      cursor: pointer;
    }

    .container {
      padding: 20px;
    }

    .container h1 {
      font-size: 20px;
      margin-bottom: 10px;
      text-align: center;
    }

    .container p {
      font-size: 14px;
      text-align: center;
      color: #555;
      margin-bottom: 20px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      color: #555;
    }

    .tab.active {
      border-bottom: 3px solid #c9a227;
      color: #000;
    }

    .form-group {
      margin-bottom: 15px;
    }

    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background-color: #c9a227;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:hover {
      background-color: #b08c1d;
    }

    .section {
      margin-top: 30px;
      text-align: center;
    }

    .section h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .section p {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }

    .btn-secondary {
      background-color: #c9a227;
      padding: 10px 20px;
      border-radius: 5px;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
    }

    .btn-secondary:hover {
      background-color: #b08c1d;
    }

    .text-bg-primary {
      background-color: #0d26b6 !important;
    }
  </style>
</head>
<body>
  <header>
    <img src="PI/Midias/Captura de tela 2026-03-11 085019.png" alt="HELP Logo" class="logo">
    <div class="menu">&#9776;</div>
  </header>

  <div class="container">
    <h1>Encontre Empregos ou Preste Serviços</h1>
    <p>Conecte-se com oportunidades de trabalho nas melhores empresas ou ofereça serviços.</p>

    <div class="tabs">
      <div class="tab active">Buscar vagas</div>
      <div class="tab">Prestar serviços</div>
    </div>

    <div class="form-group">
      <select>
        <option>Área de trabalho, cargo, localidade</option>
      </select>
    </div>

    <div class="form-group">
      <select>
        <option>Frente de trabalho/categoria</option>
      </select>
    </div>

    <button class="btn">Buscar</button>

    <div class="section">
      <h2>Procurar Vagas</h2>
      <p>Procure as oportunidades.</p>
      <a href="#" class="btn-secondary">Ver Detalhes</a>
    </div>
  </div>
<footer class="text-bg-primary p-4 row align-items-center">
    </nav>
    <p class="m-2 text-center col-sm-8" style="color: rgb(255, 255, 255);">
        Help Services - Serviços Tercerizados - Todos os direitos reservados
    </p>
    <nav class="col-sm-2">
        <a href="#"class="link-ligth"><i style="color: #fff;" class="bi bi-whatsapp"></i></a>
        <a href="#"class="link-ligth"><i style="color: #fff;"  class="bi bi-meta"></i></a>
        <a href="#"class="link-ligth"><i style="color: #fff;"  class="bi bi-telephone"></i></a>
        <a href="#"class="link-ligth"><i style="color: #fff;"  class="bi bi-instagram"></i></a>
    
</footer>
</body>
</html>
